name: Deploy Frontend to Vercel

on:
  push:
    branches:
      - main
    paths:
      - "frontend-nextjs/**"
      - ".github/workflows/frontend-deploy.yml"
  workflow_dispatch:

concurrency:
  group: frontend-vercel-${{ github.ref }}
  cancel-in-progress: true

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
  APP_DIR: frontend-nextjs

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      # Pull env vars into frontend-nextjs/.vercel (must run inside app dir)
      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: ${{ env.APP_DIR }}

      # Do NOT use `vercel build` here — it scans the linked project root (repo root),
      # finds api/app.py (FastAPI), and fails. Deploy only the frontend folder instead.
      - name: Deploy to Vercel
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} --archive=tgz
        working-directory: ${{ env.APP_DIR }}
